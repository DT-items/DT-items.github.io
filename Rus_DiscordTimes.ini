VillageBonus5=К вам подходит деревенский трактирщик. Он предлагает вам не собирать подать с деревни. Трактирщик видит, что многие из бойцов вашей армии давно не получали жалованья. Трактирщик готов хорошенько накормить и напоить бойцов - в качестве компенсации жалованья - тогда все бойцы снова будут участвовать в сражениях.
