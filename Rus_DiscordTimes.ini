Descript1=Участник множества жестоких битв, Рыцарь обладает превосходным опытом ведения боя. Благодаря покровительству церкви, Рыцарь способен противостоять враждебным магическим заклинаниям.
Descript2=Архимаг обладает способностью обращаться к могущественным силам мирозданья, неподвластным простым людям. В сражении Архимаг обездвиживает противника.
Descript3=Следопыт - быстрый и меткий стрелок, непревзойденно ориентирующийся на местности. Уделяя много времени наблюдению природы, Следопыт знает тайны быстрого заживления ран.
