VillageBonus4=Местная колдунья предлагает вам не собирать подать с деревни. Взамен она проведет ритуал, который намного увеличит вашу магическую силу.
VillageBonus4Ask=#\#\#\@Согласны ли вы воспользоваться этим предложением вместо обычного сбора подати?
