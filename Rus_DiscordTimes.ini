VillageBonus1=Местный священник предлагает вам не собирать подать с деревни. Взамен он готов наложить на ваше войско какое-нибудь доброе заклятие. Это заклятие будет действовать очень долго благодаря некоторым секретам колдовства.#\#\#\@Согласны ли вы воспользоваться этим предложением вместо обычного сбора подати?
VillageBonus2=Местный священник предлагает вам не собирать подать с деревни. Он видит, что бойцы вашей армии нуждаются в лечении. Священник готов попытаться исцелить всех, кого сможет, насколько хватит его сил.#\#\#\@Согласны ли вы воспользоваться этим предложением вместо обычного сбора подати?
VillageBonus3=К вам подходят несколько охотников из этой деревни. Они предлагают вам не собирать подать с деревни. Взамен они дадут вам шкуры, которые можно продать на рынке за деньги, гораздо большие чем обычный размер подати.
