Bonus1=Длинное Оружие - на первом ходу в битве персонаж получает утроенную рукопашную защиту (не влияет на защиту полученную от строения)
Bonus2=Быстрая Атака - на первом ходу в битве, персонаж получает +1 действие
Bonus3=Проникающий Удар - физические атаки персонажа игнорируют защиту противника, кроме защиты от строений
Bonus4=Лекарское Умение - Лекарское Умение - отряд, в котором есть такие персонажи, каждый день восстанавливает 10% жизни всем раненым воинам (срабатывает в 0 часов, суммируется с бонусом следопыта который срабатывает в 12 часов)
Bonus5=Торговец-Эксперт - отряд, в котором есть такие персонажи, получает +50% цены при продаже вещи и -30% цены при покупке вещи
Bonus6=Проклятие Смерти - Проклятие Смерти - силы Зла моментально забирают жизнь у любого врага, который убивает персонажа в битве. Не действует в случаи смерти от яда или контратаки.
Bonus7=Кара Господня - персонаж в любом случае наносит 10 повреждений сверх своей атаки, игнорируя любые защиты врага
Bonus8=Гнев Господен - персонаж в любом случае наносит 20 повреждений сверх своей атаки, игнорируя любые защиты врага
Bonus9=Неуязвимость - от любого физического удара персонаж теряет только 1 хит жизниюбого
Bonus10=Тёмный Дар - физические атаки персонажа игнорируют защиту противника, кроме защиты от строений; уменьшает входящий физический урон после вычета защиты на 1\3
Bonus11=Тёмное Искусство - физические атаки персонажа игнорируют защиту противника, кроме защиты от строений; уменьшает входящий физический урон после вычета защиты на 1\3; на первом ходу битвы персонаж получает +1 действие
Bonus12=Увертливость - уменьшает входящий физический урон после вычета защиты на 1\3 
Bonus13=Яростный Дух - от любого физического удара персонаж теряет только 1 хит жизни, а в случае гибели может лишить жизни убийцу если у того недостаточно защиты от магии смерти: 1 действие = 30%> защиты от магии смерти, 2=60%>, 3=90%> 4=неизбежная смерть
Bonus14=Шквальная Атака - персонаж на первом ходу получает +30ини, а в здании +60ини, а физический урон - игнорирует защиту противника, кроме защиты от строений
Bonus15=Гарнизон - персонаж находясь в замке или форте, увеличивает свою физическую защиту и рукопашный урон в два раза и получает только 2\3 физического урона врага, прошедшего через защиту персонажа
Bonus16=Тыловая Служба - персонаж уменьшает на 30% оплату всего войска, в котором он находиться
Bonus17=Отравленное Оружие - после любой физической атаки нанёсшей 2 и больше урона, противник теряет способность к регенерации и теряет 15% жизни на каждом ходу битвы
Bonus18=Мертвец - персонаж получает НА 2\3 меньше стрелкового урона
Bonus19=Быстрый Мертвец - мертвое тело персонажа снижает эффективность стрелковой атаки НА 2\3, а на первом ходу в битве, персонаж получает +1 действие 
Bonus20=Контрудар - персонаж отвечает рукопашным ударом на каждый рукопашный удар противника. Если у персонажа нет рукопашной атаки, то урон контрудара будет равняться 1
Bonus21=Фланговый удар - персонаж наносящий рукопашный удар сбоку, через пустую клетку, удваивает свою атаку (в дополнение к обычному игнорированию половины рукопашной защиты врага)
Bonus22=Голод - персонаж восстанавливает здоровье при убийстве врага
Bonus23=Берсерк - чем меньше у персонажа здоровья, тем больше у него урона
Bonus24=Истощение - магические атаки этого персонажа снижают иммунитет магии противника на 15% на весь бой, эффект накапливается
Bonus25=Иссушение - магические атаки этого персонажа дополнительно наносят игнорирующие иммунитет к магии 8% урона от максимального здоровья врага
Bonus26=Ядовитый - персонаж, атаковавший носящего этот бонус, отравляется на 15%
Bonus27=Смертник - персонаж умирает после своей атаки
Bonus28=Колдовство - персонаж уменьшает время произношения и цену заклинания на 20%
Bonus29=Размашистый удар - атаки этого персонажа наносят 70% урона по цели и дополнительно 30% урона соседям цели
Bonus30=Укрепление - каждый ход персонаж получает +20% к физической защите вплоть до +100%
Bonus31=Доминация - атаки этого персонажа наносят урон всему полю игрока
Bonus32=Сильный яд - после любого серьезного удара, нанесенного таким оружием, противник теряет 25% жизни на каждом ходу битвы
Bonus33=Концентрация - сила магии этого персонажа увеличивается во время боя
Bonus34=Мощная магия - магические атаки этого персонажа игнорируют иммунитет к магии
